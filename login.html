<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropCheck - Logowanie</title>
    <meta name="description" content="Zaloguj się do PropCheck - systemu zarządzania usterkami">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #f9f5f0 0%, #f5ebe0 100%);
        }
        
        .auth-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 440px;
            width: 100%;
            padding: 3rem;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: #2c2416;
        }
        
        .auth-logo svg {
            flex-shrink: 0;
        }
        
        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c2416;
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            color: #6b6259;
            font-size: 0.95rem;
        }
        
        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #f5ebe0;
        }
        
        .auth-tab {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            color: #6b6259;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
        }
        
        .auth-tab:hover {
            color: #2c2416;
        }
        
        .auth-tab.active {
            color: #8B7355;
            border-bottom-color: #8B7355;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: 500;
            color: #2c2416;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #d9cfc0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #8B7355;
            box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
        }
        
        .auth-button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: #8B7355;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .auth-button:hover:not(:disabled) {
            background: #6b5940;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: #efe;
            border: 1px solid #cfc;
            color: #363;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .success-message.show {
            display: block;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #f5ebe0;
        }
        
        .auth-footer a {
            color: #8B7355;
            text-decoration: none;
            font-weight: 500;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <svg width="40" height="40" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="32" height="32" rx="8" fill="#8B7355"/>
                        <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="#FFFAF0" stroke-width="1.5" fill="none"/>
                        <circle cx="16" cy="16" r="2" fill="#FFFAF0"/>
                        <circle cx="12" cy="14" r="1.5" fill="#FFFAF0"/>
                        <circle cx="20" cy="18" r="1.5" fill="#FFFAF0"/>
                    </svg>
                    <span>PropCheck</span>
                </div>
                <h1 class="auth-title">Witaj ponownie</h1>
                <p class="auth-subtitle">Zaloguj się, aby zarządzać swoimi nieruchomościami</p>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="signin">Logowanie</button>
                <button class="auth-tab" data-tab="signup">Rejestracja</button>
            </div>
            
            <!-- Sign In Form -->
            <form id="signinForm" class="auth-form active">
                <div class="error-message" id="signinError"></div>
                
                <div class="form-group">
                    <label class="form-label" for="signinEmail">Email</label>
                    <input 
                        type="email" 
                        id="signinEmail" 
                        class="form-input" 
                        placeholder="twoj@email.com"
                        required
                        autocomplete="email"
                        autofocus
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="signinPassword">Hasło</label>
                    <input 
                        type="password" 
                        id="signinPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="auth-button" id="signinButton">
                    <span>Zaloguj się</span>
                </button>
            </form>
            
            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>
                
                <div class="form-group">
                    <label class="form-label" for="signupEmail">Email</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        class="form-input" 
                        placeholder="twoj@email.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="signupPassword">Hasło</label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                        autocomplete="new-password"
                    >
                    <small style="color: #6b6259; font-size: 0.85rem; display: block; margin-top: 0.25rem;">
                        Minimum 6 znaków
                    </small>
                </div>
                
                <button type="submit" class="auth-button" id="signupButton">
                    <span>Zarejestruj się</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <a href="index.html">← Wróć do strony głównej</a>
            </div>
        </div>
    </div>
    
    <!-- Supabase JS SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Config & Auth modules -->
    <script src="config/supabase.js"></script>
    <script src="auth.js"></script>
    
    <!-- Login page logic -->
    <script>
        // ── Tab Switching ───────────────────────────────────────────────────────
        const tabs = document.querySelectorAll('.auth-tab');
        const forms = document.querySelectorAll('.auth-form');
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                // Update active tab
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                // Update active form
                forms.forEach(f => f.classList.remove('active'));
                document.getElementById(`${targetTab}Form`).classList.add('active');
                
                // Clear error messages
                document.querySelectorAll('.error-message, .success-message').forEach(msg => {
                    msg.classList.remove('show');
                    msg.textContent = '';
                });
                
                // Focus first input
                setTimeout(() => {
                    const activeForm = document.querySelector('.auth-form.active');
                    const firstInput = activeForm.querySelector('input');
                    if (firstInput) firstInput.focus();
                }, 100);
            });
        });
        
        // ── Sign In Handler ─────────────────────────────────────────────────────
        const signinForm = document.getElementById('signinForm');
        const signinButton = document.getElementById('signinButton');
        const signinError = document.getElementById('signinError');
        
        signinForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signinEmail').value.trim();
            const password = document.getElementById('signinPassword').value;
            
            // Clear previous errors
            signinError.classList.remove('show');
            signinError.textContent = '';
            
            // Disable button + show loading
            signinButton.disabled = true;
            signinButton.innerHTML = '<span class="spinner"></span><span>Logowanie...</span>';
            
            try {
                const result = await signIn(email, password);
                
                if (result.success) {
                    // Success! Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // Show error
                    signinError.textContent = result.error;
                    signinError.classList.add('show');
                }
            } catch (err) {
                signinError.textContent = 'Wystąpił nieoczekiwany błąd';
                signinError.classList.add('show');
            } finally {
                // Re-enable button
                signinButton.disabled = false;
                signinButton.innerHTML = '<span>Zaloguj się</span>';
            }
        });
        
        // ── Sign Up Handler ─────────────────────────────────────────────────────
        const signupForm = document.getElementById('signupForm');
        const signupButton = document.getElementById('signupButton');
        const signupError = document.getElementById('signupError');
        const signupSuccess = document.getElementById('signupSuccess');
        
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            // Clear previous messages
            signupError.classList.remove('show');
            signupSuccess.classList.remove('show');
            signupError.textContent = '';
            signupSuccess.textContent = '';
            
            // Disable button + show loading
            signupButton.disabled = true;
            signupButton.innerHTML = '<span class="spinner"></span><span>Rejestracja...</span>';
            
            try {
                const result = await signUp(email, password);
                
                if (result.success) {
                    // Success! Redirect to dashboard
                    signupSuccess.textContent = 'Konto zostało utworzone! Przekierowywanie...';
                    signupSuccess.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    // Show error
                    signupError.textContent = result.error;
                    signupError.classList.add('show');
                }
            } catch (err) {
                signupError.textContent = 'Wystąpił nieoczekiwany błąd';
                signupError.classList.add('show');
            } finally {
                // Re-enable button (unless success)
                if (!signupSuccess.classList.contains('show')) {
                    signupButton.disabled = false;
                    signupButton.innerHTML = '<span>Zarejestruj się</span>';
                }
            }
        });
        
        // ── Enter key submit ────────────────────────────────────────────────────
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const form = input.closest('form');
                    if (form) {
                        form.dispatchEvent(new Event('submit'));
                    }
                }
            });
        });
        
        // ── Check if already logged in ──────────────────────────────────────────
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                // Already logged in, redirect to dashboard
                window.location.href = 'dashboard.html';
            }
        })();
    </script>
</body>
</html>
